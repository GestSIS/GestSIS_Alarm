version: '3'

services:
  gestsis_alarm:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    container_name: gestsis_alarm
    volumes:
      - .:/gestsis_alarm
    ports:
      - "8000:8000"
    environment:
      GESTSIS_DEBUG_MODE: true
      GESTSIS_ALARM_ALLOWED_HOSTS: localhost,127.0.0.1
      GESTSIS_ALARM_MAIL_SERVER: ""
      GESTSIS_ALARM_MAIL_PORT: ""
      GESTSIS_ALARM_MAIL_USERNAME: ""
      GESTSIS_ALARM_MAIL_PASSWORD: ""
      GESTSIS_ALARM_MAIL_WHITELIST: ""
