version: '3'

services:
  alarm:
    build: .
    command: >
      sh -c "pip install -r requirements.txt &&
      python init.py &&
      cd gestsis_alarm &&
      python manage.py migrate &&
      python manage.py loaddata sis &&
      python manage.py runserver 0.0.0.0:8000"
    container_name: gestsis-alarm
    volumes:
      - .:/usr/src/app
    ports:
      - "8000:8000"
